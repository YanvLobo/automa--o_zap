# VirtualZap CRM — conecta na SUA Evolution API já existente.
#
# Sobe SÓ o CRM (não sobe Evolution/Postgres/Redis, porque você já tem a Evolution
# rodando em outro lugar). O CRM manda mensagem pela sua Evolution e recebe as
# respostas de volta pelo webhook.
#
# Depois do deploy o painel fica em:  http://SEU_IP_DA_VPS:8765
#
# Os 4 valores abaixo (EVOLUTION_URL, EVOLUTION_INSTANCIA, EVOLUTION_APIKEY e
# CRM_WEBHOOK_URL) precisam ser informados no deploy — pelo campo de "variáveis
# de ambiente" da Hostinger, ou pelo arquivo deploy/.env (veja .env.crm.example).
#
# ⚠️ Versão de teste: painel sem senha/HTTPS. Para produção, use a versão com
# domínio (docker-compose.prod.yml).

services:
  crm:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    ports:
      - "8765:8765"
    environment:
      CRM_CANAL: evolution
      # Endereço da SUA Evolution (ex.: https://evolution.seusite.com)
      EVOLUTION_URL: ${EVOLUTION_URL}
      # Nome da instância na sua Evolution (a que está conectada ao WhatsApp)
      EVOLUTION_INSTANCIA: ${EVOLUTION_INSTANCIA}
      # Chave (API key) da sua Evolution
      EVOLUTION_APIKEY: ${EVOLUTION_APIKEY}
      EVOLUTION_VERSAO: v2
      # Endereço público que a sua Evolution vai chamar quando chegar resposta.
      # É o IP da VPS onde o CRM roda, ex.: http://SEU_IP_DA_VPS:8765/webhook/evolution
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL}
      CRM_WORKER_AUTOSTART: "true"
      CRM_LOTE_MAXIMO: "30"
      CRM_LOTE_PAUSA_MINUTOS: "10"
    volumes:
      - crm_data:/data

volumes:
  crm_data:
