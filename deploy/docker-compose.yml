# VirtualZap CRM — versão simples para a interface da Hostinger.
#
# Sobe SÓ o CRM. Você conecta à sua Evolution DEPOIS, pelo próprio painel
# (botão "⚙ Evolution") — então NÃO precisa preencher chave nem variável nenhuma
# aqui. Nada de segredo passa pelo GitHub.
#
# Depois do deploy, abra:  http://SEU_IP_DA_VPS:8765
# e clique em "⚙ Evolution" para colar o endereço, a instância e a chave.
#
# ⚠️ Versão de teste: painel sem senha/HTTPS. Para produção (com domínio, senha e
# cadeado), use deploy/docker-compose.prod.yml.

services:
  crm:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    ports:
      - "8765:8765"
    environment:
      CRM_CANAL: evolution
      CRM_WORKER_AUTOSTART: "true"
      CRM_LOTE_MAXIMO: "30"
      CRM_LOTE_PAUSA_MINUTOS: "10"
    volumes:
      - crm_data:/data

volumes:
  crm_data:
